# fuzzel — Catppuccin Mocha（rofi の config.rasi と統一）
# 用途: アプリ検索(Super+d) と ウィンドウ切替。fuzzel は Wayland ネイティブで
# text-input(IME) 対応のため、ここでは日本語入力で直接検索できる。

[main]
font=AdwaitaMono Nerd Font:size=12
prompt=" "
icons-enabled=yes
lines=10
width=36
horizontal-pad=16
vertical-pad=14
inner-pad=12
line-height=22
tabs=4
# 入力途中の確定文字(preedit)も出るので IME と相性が良い

[colors]
background=1e1e2eff
text=ffffffff
prompt=cba6f7ff
placeholder=a6adc8ff
input=ffffffff
match=89b4faff
selection=cba6f7ff
selection-text=1e1e2eff
selection-match=1e1e2eff
border=cba6f7ff

[border]
width=2
radius=16

[dmenu]
# --dmenu 利用時の挙動（exit-immediately など）はコマンド側フラグで制御
