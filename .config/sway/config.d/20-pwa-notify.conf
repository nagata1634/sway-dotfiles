# Gmail / カレンダー PWA を Brave で常駐させ、通知を受け続ける設定。
#
# 仕組み: ログイン時に PWA ウィンドウを開く → スクラッチパッドへ隠す。
# ウィンドウ(プロセス)は動き続けるので、dunst 経由でデスクトップ通知が届く。
# 普段は隠れていて、$mod+- で引き出し表示できる。
#
# 注意: 初回だけ Brave に Google ログイン＋各サービスで通知を許可する必要あり。

# 起動時に開く（既存の Brave インスタンスがあればそこに開く＝ログインは1回で済む）
exec flatpak run com.brave.Browser --app=https://mail.google.com/
exec flatpak run com.brave.Browser --app=https://calendar.google.com/

# 開いた PWA をスクラッチパッドへ。app_id は URL 由来で確定的なので確実にマッチする。
# フローティング化＋画面に収まるサイズに固定（大きすぎて画面外に出るのを防ぐ）。
# 3画面すべて(縦DP 幅1440 / 横DP 高さ1440 / eDP-1 1920x1080)に収まる 1400x1040 に。
for_window [app_id="^brave-mail\.google\.com"] floating enable, resize set 1400 1040, move scratchpad
for_window [app_id="^brave-calendar\.google\.com"] floating enable, resize set 1400 1040, move scratchpad
