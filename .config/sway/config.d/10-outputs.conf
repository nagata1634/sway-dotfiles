# ディスプレイ構成（ユーザー管理）
#
# DP-6 : KTC H27T27  横向き 2560x1440  … 左
# DP-5 : KTC H27T27  縦向き(時計回り90度) … 一番右
# eDP-1: ノート内蔵   1920x1080 … クラムシェル運用（蓋連動で自動オン/オフ）

# 横モニター（左）。縦位置 y=967 は DP-6 下端を DP-5 の物理高さに合わせた値。
output DP-6 mode 2560x1440 position 0 967 transform normal

# 縦モニター（反時計回り90度 = transform 270）。回転後は論理サイズ 1440x2560。
# DP-6 の右隣（x=2560）に配置 → 一番右。
output DP-5 mode 2560x1440 position 2560 0 transform 270

# ノート内蔵は縦モニターのさらに右に置く（蓋を開けたとき用の位置）
output eDP-1 mode 1920x1080 position 4000 0 transform normal

# 壁紙：DP-6(左/横)とDP-5(右/縦)に1枚の画像をまたがって表示
# （全体4000x2560にカバー配置した画像を各領域に切り出したもの）
output DP-6 bg $HOME/Pictures/background/.span/dp6.png fill
output DP-5 bg $HOME/Pictures/background/.span/dp5.png fill

# クラムシェル運用：蓋を閉じたら eDP-1 を無効化、開いたら有効化。
# --reload を付けると設定リロード/起動時に現在の蓋の状態に応じて即適用される。
bindswitch --reload --locked lid:on  output eDP-1 disable
bindswitch --reload --locked lid:off output eDP-1 enable
